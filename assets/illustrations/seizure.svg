  <path d="M 33,48 L 38,48 L 35,43 L 42,50 L 37,50 L 40,55 Z" fill="#F1C40F" />
  <path d="M 117,48 L 112,48 L 115,43 L 108,50 L 113,50 L 110,55 Z" fill="#F1C40F" />
