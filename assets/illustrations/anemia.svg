  <ellipse cx="55" cy="75" rx="10" ry="8" fill="#FADBD8" opacity="0.8" />
  
  <!-- Pale Red Blood Cell (Anemic) -->
  <ellipse cx="95" cy="75" rx="18" ry="14" fill="#FADBD8" stroke="#EC7063" stroke-width="1.8" />
  <ellipse cx="95" cy="75" rx="8" ry="6" fill="#FDEDEC" opacity="0.8" />

