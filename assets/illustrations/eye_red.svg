<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <circle cx="75" cy="75" r="65" fill="#FDEDEC" />
  <!-- Eye Outer -->
  <path d="M 35,75 C 50,50 100,50 115,75 C 100,100 50,100 35,75 Z" fill="#FFFFFF" stroke="#EC7063" stroke-width="3" stroke-linejoin="round" />
  <!-- Iris (Light blue with slight pink border for red-eye look) -->
  <circle cx="75" cy="75" r="22" fill="#5DADE2" stroke="#EC7063" stroke-width="2" />
  <!-- Pupil -->
  <circle cx="75" cy="75" r="10" fill="#2C3E50" />
  <!-- Eye highlights -->
  <circle cx="71" cy="71" r="3.5" fill="#FFFFFF" />
  <circle cx="79" cy="79" r="1.5" fill="#FFFFFF" />
  <!-- Eyelashes (cute, child-like) -->
  <path d="M 50,56 L 46,50" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" />
  <path d="M 75,53 L 75,46" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" />
  <path d="M 100,56 L 104,50" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" />
  <!-- A tiny smiley tear -->
  <path d="M 33,78 C 30,82 32,86 35,86 C 38,86 40,82 37,78 Z" fill="#AED6F1" />
</svg>
