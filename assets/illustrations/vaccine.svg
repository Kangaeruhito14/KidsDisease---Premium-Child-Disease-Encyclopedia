<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150">
  <circle cx="75" cy="75" r="65" fill="#EAF2F8" />
  <!-- Vaccine Vial -->
  <rect x="42" y="60" width="22" height="38" rx="3" fill="#FFFFFF" stroke="#2980B9" stroke-width="2.5" />
  <rect x="46" y="52" width="14" height="8" fill="#BDC3C7" stroke="#2980B9" stroke-width="2" />
  <!-- Liquid inside vial (light blue) -->
  <rect x="45" y="70" width="16" height="25" fill="#AED6F1" opacity="0.8" />
  <!-- Vial Label with a tiny heart -->
  <rect x="46" y="72" width="14" height="10" fill="#FFFFFF" />
  <path d="M 53,75 C 52,74 51,74 50,75 C 49,76 49,78 51,79 L 53,81 L 55,79 C 57,78 57,76 56,75 C 55,74 54,74 53,75 Z" fill="#E74C3C" />

  <!-- Syringe -->
  <rect x="85" y="45" width="12" height="42" rx="1" fill="#FFFFFF" stroke="#7F8C8D" stroke-width="2" transform="rotate(30, 91, 66)" />
  <!-- Needle -->
  <line x1="77" y1="90" x2="68" y2="105" stroke="#7F8C8D" stroke-width="2.5" stroke-linecap="round" />
  <!-- Plunger -->
  <line x1="102" y1="35" x2="94" y2="48" stroke="#7F8C8D" stroke-width="3" stroke-linecap="round" />
  <rect x="98" y="29" width="10" height="4" fill="#BDC3C7" stroke="#7F8C8D" stroke-width="1.5" transform="rotate(30, 103, 31)" />
  <!-- Cute Face on Syringe -->
  <circle cx="89" cy="58" r="0.8" fill="#2C3E50" />
  <circle cx="94" cy="61" r="0.8" fill="#2C3E50" />
</svg>
